# Runtime configuration for examples/gpt_lm/main.c.
# Format: flat YAML, one scalar `key: value` per line.
# Run with: ./gd_main_gpt_lm --config config.yaml

# Data/checkpoints/metrics paths are interpreted relative to the process cwd.
# `make -C examples/gpt_lm run` runs from this directory.
data_dir: data
tokenizer_path: ""
generate_prompt: ""
checkpoint_path: checkpoints/gpt_lm_best.gdckpt
latest_checkpoint_path: checkpoints/gpt_lm_latest.gdckpt
load_checkpoint_path: ""
resume_checkpoint_path: ""
val_split: val
metrics_dir: ../../data/metrics
metrics_project: gpt_lm
metrics_run_id: ""
local_shard_cache_dir: ""

# Training/runtime.
epochs: 2
batch_size: 64
dataloader_workers: 2
dataloader_prefetch_factor: 4
layers: 3
architecture: gpt
shuffle_scope: global
minimax_m3_topk_blocks: 3
minimax_m3_init_blocks: 1
minimax_m3_local_blocks: 1
report_every: 10
eval_every_n_epochs: 1
early_stopping_patience: 10
warmup_steps: -1
latest_every_n_steps: 0
generate_every_n_steps: 0
save_best: true
save_latest: true
metrics_enabled: true
keep_shard_cache: false
overfit_num_samples: 0
seed: 0x6750746c6d5eed00

# Optimization/model regularization.
dropout_p: 0.05
lr_max: 0.0003
lr_min: 0.00005
weight_decay: 0.0001
grad_clip_norm: 1.0

# Generation settings used when generate_prompt or generate_every_n_steps is set.
max_new_tokens: 64
temperature: 0.0
min_p: 0.0
repetition_penalty: 1.0
logits_softcap: 30.0
